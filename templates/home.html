<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>歡迎使用第二組點餐</title>
  <style>
body {
    font-family: "Microsoft JhengHei", sans-serif;
    margin: 0;
    padding: 0;
    background-color: #f5f5f5;
    display: flex;
    justify-content: center;
}

/* 手機框 */
.mobile-container {
    width: 100%;
    max-width: 450px;
    min-height: 100vh;
    background-color: white;
    box-shadow: 0 0 20px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
}

/* 上方圖片 */
.image-box {
    width: 100%;
    height: 250px;
    overflow: hidden;
}
.image-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 標題 */
.header {
    padding: 20px;
    text-align: center;
}
.header h1 {
    margin: 0;
}

/* 按鈕區 */
.menu {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* 按鈕樣式 */
.menu button {
    padding: 15px;
    font-size: 18px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    color: white;
}

/* 不同按鈕顏色 */
.register-btn { background-color: #4CAF50; }
.login-btn { background-color: #2196F3; }
.guest-btn { background-color: #ff5722; }
  </style>
</head>

<body>
  <div class="mobile-container">
    <div class="image-box">
      <img src="{{url_for('static',filename='store_logo.jpg')}}">
    </div>
	<div class="header">
      <h1>歡迎使用第二組點餐</h1>
    </div>    
    <!-- 加required強制輸入 -->
    <div class="menu">
	  <button class="register-btn" onclick="location.href='{{ url_for('register') }}'">註冊</button>
	  <button class="login-btn" onclick="location.href='{{ url_for('login') }}'">登入</button>
	  <button class="guest-btn" onclick="location.href='{{url_for('guest') }}'">訪客登入</button>
	</div>
  </div>
  
  {% if msg %}
  <script>alert({{msg|tojson}});</script>
  {% endif %}
    
</body>

</html>
