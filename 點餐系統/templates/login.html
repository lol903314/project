<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>登入</title>
  <style>
body {
    font-family: "Microsoft JhengHei", sans-serif;
    margin: 0;
    padding: 0;
    background-color: #f5f5f5;
    display: flex;
    justify-content: center;
}

/* 手機框 */
.mobile-container {
    width: 100%;
    max-width: 450px;
    min-height: 100vh;
    background-color: white;
    box-shadow: 0 0 20px rgba(0,0,0,0.1);
}

/* 上方圖片 */
.image-box {
    width: 100%;
    height: 250px;
    overflow: hidden;
}
.image-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 標題 */
.header {
    text-align: center;
    padding: 15px;
}
.header h1 {
    margin: 5px 0;
}

/* 表單 */
.form-box {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* 表單 */
.form-box form {
    display: flex;
    flex-direction: column;
    align-items: center;  /* 水平置中 */
}

/* 輸入框 */
.form-box input {
    width: 80%;
    padding: 12px;
    font-size: 16px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

/* 按鈕 */
.submit-btn {
    width: 80%;
    background-color: #ff5722;
    color: white;
    border: none;
    padding: 12px;
    font-size: 16px;
    border-radius: 25px;
    cursor: pointer;
}

/* 連結 */
.link-box {
    text-align: center;
    margin-top: 10px;
}
.link-box a {
    color: #2196F3;
    text-decoration: none;
}
  </style>
</head>

<body>

  <div class="mobile-container">
    <div class="image-box">
	  <img src="{{url_for('static',filename='store_logo.jpg')}}">
	</div>
	<div class="header">
	  <h1>登入</h1>
	  <h1>-----------------</h1>
	</div>
	<div class="form-box">
      <form action="/login" method="POST">
        <!-- 加required強制輸入 -->
		<input type="text" placeholder="帳號" name="user" required><br>
		<input type="password" placeholder="密碼" name="password" required><br>
		<button type="submit" class="submit-btn">登入</button>
      </form>
      <div class="link-box">
        <p>沒有帳號?<a href='/register'>註冊</a></p>
        <p>忘記密碼?<a href='/forgot_password'>點我</a></p>
        <p>返回首頁<a href='/'>點我</a></p>
	  </div>
	</div>
  </div>
  
  {% if msg %}
  <script>alert({{msg|tojson}});</script>
  {% endif %}

</body>

</html>
