<!DOCTYPE html> <!-- 告訴瀏覽器這是一份 HTML5 文件 -->
<html lang="zh-Hant"> <!-- 設定頁面語言為繁體中文 -->
<head> <!-- head 區塊開始 -->
    <meta charset="UTF-8"> <!-- 設定文字編碼，避免中文亂碼 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- 讓手機畫面可以正常縮放 -->
    <title>結帳確認</title> <!-- 設定瀏覽器分頁標題 -->
    <style> /* CSS 區塊開始 */
        body { /* 設定整個頁面的基本樣式 */
            font-family: Arial, "Microsoft JhengHei", sans-serif; /* 設定中文字體與備用字體 */
            background: linear-gradient(180deg, #fff3e0 0%, #f6efe6 38%, #f4f4f4 100%); /* 使用暖色漸層背景增加專題感 */
            margin: 0; /* 清除瀏覽器預設外距 */
            padding: 0; /* 清除瀏覽器預設內距 */
            color: #2f2a25; /* 設定整體文字顏色 */
        } /* body 樣式結束 */
        .page-shell { /* 設定頁面主外框 */
            width: min(92%, 1040px); /* 限制頁面最大寬度 */
            margin: 24px auto 36px auto; /* 讓頁面置中並留上下距離 */
        } /* page-shell 樣式結束 */
        .hero { /* 設定上方主視覺區 */
            position: relative; /* 讓裝飾圖層可以定位 */
            overflow: hidden; /* 隱藏超出區塊的裝飾 */
            border-radius: 24px; /* 設定大圓角 */
            background: linear-gradient(135deg, rgba(97, 58, 33, 0.94), rgba(191, 104, 35, 0.9)); /* 使用深淺咖啡色漸層 */
            min-height: 230px; /* 設定主視覺最小高度 */
            box-shadow: 0 20px 40px rgba(88, 55, 24, 0.18); /* 設定大面積陰影 */
            display: grid; /* 使用 grid 讓內容和裝飾排版 */
            grid-template-columns: minmax(0, 1.3fr) minmax(220px, 0.9fr); /* 讓文字與圖片左右分欄 */
        } /* hero 樣式結束 */
        .hero-content { /* 設定主視覺文字區 */
            padding: 28px 28px 30px 28px; /* 設定內距 */
            color: #fff9f2; /* 文字使用暖白色 */
            position: relative; /* 讓內容維持在裝飾圖層上方 */
            z-index: 2; /* 提高層級避免被遮住 */
        } /* hero-content 樣式結束 */
        .hero-label { /* 設定小標籤 */
            display: inline-block; /* 讓標籤依內容顯示 */
            padding: 7px 12px; /* 設定標籤內距 */
            border-radius: 999px; /* 做成膠囊 */
            background-color: rgba(255, 249, 242, 0.18); /* 使用半透明白底 */
            font-size: 12px; /* 標籤字體大小 */
            letter-spacing: 0.08em; /* 稍微拉開字距 */
            margin-bottom: 14px; /* 標籤下方留距離 */
        } /* hero-label 樣式結束 */
        .hero h1 { /* 設定主標題樣式 */
            margin: 0 0 10px 0; /* 設定標題外距 */
            font-size: clamp(28px, 4vw, 42px); /* 依螢幕調整標題大小 */
            line-height: 1.15; /* 設定行高 */
        } /* hero h1 樣式結束 */
        .hero p { /* 設定主視覺說明文字 */
            margin: 0; /* 清除段落外距 */
            max-width: 520px; /* 限制說明文字寬度 */
            line-height: 1.7; /* 提高可讀性 */
            color: rgba(255, 249, 242, 0.88); /* 使用半透明暖白色 */
        } /* hero p 樣式結束 */
        .hero-art { /* 設定右側裝飾圖區 */
            position: relative; /* 讓背景圖與遮罩可以定位 */
            min-height: 230px; /* 與主視覺保持一致高度 */
            background-image: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(0, 0, 0, 0.18)), url("{{ url_for('static', filename='images/BaconToast.jpg') }}"); /* 使用現有圖片做視覺背景 */
            background-size: cover; /* 讓背景圖填滿 */
            background-position: center; /* 讓背景圖置中 */
        } /* hero-art 樣式結束 */
        .hero-art::before { /* 設定額外暖色遮罩 */
            content: ""; /* 建立裝飾元素 */
            position: absolute; /* 使用絕對定位 */
            inset: 0; /* 讓遮罩撐滿整個區域 */
            background: radial-gradient(circle at 28% 35%, rgba(255, 205, 148, 0.35), transparent 50%); /* 增加暖色氣氛 */
        } /* hero-art::before 樣式結束 */
        .layout { /* 設定主要內容區兩欄排版 */
            display: grid; /* 使用 grid 排版 */
            grid-template-columns: minmax(0, 1.15fr) minmax(320px, 0.85fr); /* 左右兩欄配置 */
            gap: 22px; /* 欄位間距 */
            margin-top: 22px; /* 與上方主視覺保持距離 */
        } /* layout 樣式結束 */
        .panel { /* 設定共用白色面板 */
            background-color: rgba(255, 255, 255, 0.96); /* 使用接近白色背景 */
            border-radius: 24px; /* 設定大圓角 */
            padding: 22px; /* 設定面板內距 */
            box-shadow: 0 16px 34px rgba(80, 61, 41, 0.08); /* 設定柔和陰影 */
        } /* panel 樣式結束 */
        .section-title { /* 設定區塊標題 */
            margin: 0 0 8px 0; /* 設定標題外距 */
            font-size: 24px; /* 標題字體大小 */
            color: #4a2f1d; /* 使用深咖啡色 */
        } /* section-title 樣式結束 */
        .section-tip { /* 設定區塊說明 */
            margin: 0 0 18px 0; /* 設定外距 */
            color: #776a5b; /* 使用柔和灰褐色 */
            line-height: 1.7; /* 提高可讀性 */
        } /* section-tip 樣式結束 */
        .form-box { /* 設定顧客資料表單區 */
            background: linear-gradient(180deg, #fff8f1, #fffdfb); /* 改成暖白色卡片 */
            border: 1px solid #f2dfc7; /* 設定淡邊框 */
            border-radius: 18px; /* 表單區做圓角 */
            padding: 18px; /* 表單區內距 */
            margin-bottom: 18px; /* 表單區下方留距離 */
        } /* form-box 樣式結束 */
        .row { /* 設定表單每一列 */
            margin-bottom: 14px; /* 每列下方留距離 */
        } /* row 樣式結束 */
        .row:last-child { /* 設定最後一列 */
            margin-bottom: 0; /* 最後一列不要下方距離 */
        } /* row:last-child 樣式結束 */
        label { /* 設定欄位標籤樣式 */
            display: block; /* 標籤自己佔一行 */
            margin-bottom: 7px; /* 標籤下方留距離 */
            font-weight: bold; /* 標籤加粗 */
            color: #5c3a22; /* 使用深咖啡色 */
        } /* label 樣式結束 */
        input { /* 設定輸入框樣式 */
            width: 100%; /* 輸入框寬度撐滿 */
            padding: 12px 13px; /* 輸入框內距 */
            font-size: 16px; /* 輸入框文字大小 */
            border: 1px solid #dec8b0; /* 輸入框邊框 */
            border-radius: 12px; /* 輸入框圓角 */
            box-sizing: border-box; /* 避免 padding 撐爆寬度 */
            background-color: #fffdfa; /* 輸入框背景 */
        } /* input 樣式結束 */
        textarea { /* 設定多行備註輸入框樣式 */
            width: 100%; /* 備註輸入框寬度撐滿 */
            padding: 12px 13px; /* 備註輸入框內距 */
            font-size: 16px; /* 備註輸入框文字大小 */
            border: 1px solid #dec8b0; /* 備註輸入框邊框 */
            border-radius: 12px; /* 備註輸入框圓角 */
            box-sizing: border-box; /* 避免 padding 撐爆寬度 */
            resize: vertical; /* 只允許上下調整高度 */
            background-color: #fffdfa; /* 備註輸入框背景 */
        } /* textarea 樣式結束 */
        .info-grid { /* 設定資訊卡片區塊 */
            display: grid; /* 使用 grid 排版 */
            grid-template-columns: repeat(3, 1fr); /* 一列三欄 */
            gap: 12px; /* 卡片間距 */
            margin-bottom: 18px; /* 與下方區塊留距離 */
        } /* info-grid 樣式結束 */
        .info-card { /* 設定資訊小卡 */
            background-color: #fff6ee; /* 使用暖色底 */
            border: 1px solid #f1dfcd; /* 加上淡邊框 */
            border-radius: 16px; /* 設定圓角 */
            padding: 14px; /* 設定內距 */
        } /* info-card 樣式結束 */
        .info-card-title { /* 設定小卡標題 */
            font-size: 12px; /* 標題字體大小 */
            color: #9a8268; /* 使用淡褐色 */
            margin-bottom: 8px; /* 標題下方留距離 */
        } /* info-card-title 樣式結束 */
        .info-card-value { /* 設定小卡數值 */
            font-size: 22px; /* 數值字體放大 */
            font-weight: bold; /* 數值加粗 */
            color: #4a2f1d; /* 使用深咖啡色 */
        } /* info-card-value 樣式結束 */
        .order-list-shell { /* 設定訂單商品區外框 */
            background: linear-gradient(180deg, #fffaf5, #ffffff); /* 使用暖白漸層底色 */
            border: 1px solid #f0e1d1; /* 加上淡邊框 */
            border-radius: 20px; /* 設定圓角 */
            padding: 16px; /* 設定內距 */
        } /* order-list-shell 樣式結束 */
        .order-list-head { /* 設定商品區標題列 */
            display: flex; /* 使用 flex 排版 */
            justify-content: space-between; /* 左右內容分開 */
            align-items: center; /* 垂直置中 */
            margin-bottom: 14px; /* 與下方內容留距離 */
        } /* order-list-head 樣式結束 */
        .order-list-head h2 { /* 設定商品區標題 */
            margin: 0; /* 清除標題外距 */
            font-size: 22px; /* 標題字體大小 */
            color: #4a2f1d; /* 使用深咖啡色 */
        } /* order-list-head h2 樣式結束 */
        .order-badge { /* 設定狀態標籤 */
            display: inline-flex; /* 讓內容置中 */
            align-items: center; /* 垂直置中 */
            gap: 6px; /* 圖示與文字距離 */
            padding: 7px 12px; /* 設定內距 */
            border-radius: 999px; /* 做成膠囊 */
            background-color: #ffe7d6; /* 設定暖橘色背景 */
            color: #b45b18; /* 設定標籤文字顏色 */
            font-size: 13px; /* 字體大小 */
            font-weight: bold; /* 文字加粗 */
        } /* order-badge 樣式結束 */
        #order-list { /* 設定商品明細容器 */
            display: grid; /* 使用 grid 排版卡片 */
            gap: 14px; /* 卡片間距 */
        } /* order-list 樣式結束 */
        .item { /* 設定每一筆商品外框 */
            background-color: #ffffff; /* 商品卡片白底 */
            border: 1px solid #f0dfcf; /* 商品卡片邊框 */
            border-radius: 18px; /* 商品卡片圓角 */
            padding: 16px; /* 商品卡片內距 */
            box-shadow: 0 8px 18px rgba(120, 87, 54, 0.06); /* 商品卡片陰影 */
            position: relative; /* 讓裝飾條定位 */
            overflow: hidden; /* 隱藏超出部分 */
        } /* item 樣式結束 */
        .item::before { /* 設定商品卡片左側裝飾條 */
            content: ""; /* 建立裝飾元素 */
            position: absolute; /* 使用絕對定位 */
            left: 0; /* 靠左放置 */
            top: 0; /* 靠上放置 */
            bottom: 0; /* 撐滿高度 */
            width: 6px; /* 設定裝飾條寬度 */
            background: linear-gradient(180deg, #ffb74d, #fb8c00); /* 使用橘色漸層 */
        } /* item::before 樣式結束 */
        .name { /* 設定商品名稱樣式 */
            font-size: 20px; /* 商品名稱字體放大 */
            font-weight: bold; /* 商品名稱加粗 */
            margin-bottom: 10px; /* 商品名稱下方留距離 */
            color: #3f2a1f; /* 使用深褐色 */
            padding-left: 8px; /* 讓文字與左側裝飾條拉開 */
        } /* name 樣式結束 */
        .text { /* 設定商品細節文字 */
            color: #6e6257; /* 細節文字使用灰褐色 */
            margin-bottom: 6px; /* 細節文字下方留一點距離 */
            padding-left: 8px; /* 與裝飾條保持距離 */
            line-height: 1.6; /* 提升可讀性 */
        } /* text 樣式結束 */
        .summary { /* 設定訂單總結區 */
            margin-top: 18px; /* 總結區上方留距離 */
            padding: 18px; /* 設定內距 */
            border-radius: 18px; /* 設定圓角 */
            background: linear-gradient(180deg, #4e342e, #6d4c41); /* 使用深色背景強化資訊 */
            color: #fffaf5; /* 總結區文字使用白色 */
        } /* summary 樣式結束 */
        .summary div { /* 設定總結區每一行 */
            margin-bottom: 8px; /* 每行下方留距離 */
        } /* summary div 樣式結束 */
        .summary div:last-child { /* 設定總結區最後一行 */
            margin-bottom: 0; /* 最後一行不留距離 */
        } /* summary div:last-child 樣式結束 */
        .btn-area { /* 設定按鈕區 */
            display: flex; /* 使用 flex 排版 */
            justify-content: space-between; /* 左右按鈕分開 */
            gap: 12px; /* 按鈕中間留距離 */
            margin-top: 22px; /* 按鈕區上方留距離 */
        } /* btn-area 樣式結束 */
        .btn { /* 設定共用按鈕 */
            flex: 1; /* 讓按鈕平均分配寬度 */
            padding: 14px 18px; /* 按鈕內距 */
            border: none; /* 移除按鈕邊框 */
            border-radius: 16px; /* 按鈕做圓角 */
            color: white; /* 按鈕文字設白色 */
            cursor: pointer; /* 滑鼠移上去顯示手指 */
            font-size: 15px; /* 設定字體大小 */
            font-weight: bold; /* 按鈕文字加粗 */
        } /* btn 樣式結束 */
        .back-btn { /* 設定返回購物車按鈕 */
            background: linear-gradient(135deg, #607d8b, #455a64); /* 返回按鈕使用藍灰色漸層 */
        } /* back-btn 樣式結束 */
        .send-btn { /* 設定送出訂單按鈕 */
            background: linear-gradient(135deg, #ff8a65, #f4511e); /* 送出訂單按鈕使用橘色漸層 */
        } /* send-btn 樣式結束 */
        .empty { /* 設定空狀態提示 */
            text-align: center; /* 文字置中 */
            color: #8a7f74; /* 文字使用灰色 */
            padding: 34px 16px; /* 上下留距離 */
            background-color: #fffdfb; /* 給空狀態一個淡背景 */
            border: 1px dashed #dfc8af; /* 加上虛線框 */
            border-radius: 16px; /* 設定圓角 */
        } /* empty 樣式結束 */
        @media (max-width: 860px) { /* 平板以下改成單欄版面 */
            .hero { /* 調整主視覺區版型 */
                grid-template-columns: 1fr; /* 改成單欄顯示 */
            } /* hero 響應式樣式結束 */
            .hero-art { /* 調整裝飾圖高度 */
                min-height: 180px; /* 縮小高度 */
            } /* hero-art 響應式樣式結束 */
            .layout { /* 調整主要內容區版型 */
                grid-template-columns: 1fr; /* 改成單欄 */
            } /* layout 響應式樣式結束 */
        } /* 平板響應式結束 */
        @media (max-width: 560px) { /* 手機版調整 */
            .page-shell { /* 調整整體外距 */
                width: calc(100% - 20px); /* 縮小左右外距 */
                margin: 10px auto 20px auto; /* 調整上下距離 */
            } /* page-shell 響應式樣式結束 */
            .hero-content { /* 調整主視覺文字區 */
                padding: 22px 18px 24px 18px; /* 縮小內距 */
            } /* hero-content 響應式樣式結束 */
            .panel { /* 調整卡片內距 */
                padding: 16px; /* 縮小面板內距 */
            } /* panel 響應式樣式結束 */
            .info-grid { /* 調整資訊卡片 */
                grid-template-columns: 1fr; /* 改成單欄 */
            } /* info-grid 響應式樣式結束 */
            .btn-area { /* 調整按鈕排列 */
                flex-direction: column; /* 改成上下排列 */
            } /* btn-area 響應式樣式結束 */
        } /* 手機響應式結束 */
    </style> <!-- CSS 區塊結束 -->
</head> <!-- head 區塊結束 -->
<body> <!-- body 區塊開始 -->
    <div class="page-shell"> <!-- 頁面主外框開始 -->
        <div class="hero"> <!-- 上方主視覺區開始 -->
            <div class="hero-content"> <!-- 主視覺文字區開始 -->
                <div class="hero-label">CHECKOUT STATION</div> <!-- 顯示小標籤 -->
                <h1>確認這一桌的菜色與取餐資訊</h1> <!-- 顯示主標題 -->
                <p>訂單資料會直接沿用目前購物車內容，請確認餐點數量、取餐時間與聯絡方式，再送出本次訂單。</p> <!-- 顯示說明文字 -->
            </div> <!-- 主視覺文字區結束 -->
            <div class="hero-art"></div> <!-- 主視覺右側裝飾圖結束 -->
        </div> <!-- 上方主視覺區結束 -->
        <div class="layout"> <!-- 主要內容排版開始 -->
            <div class="panel"> <!-- 左側商品資訊面板開始 -->
                <div class="order-list-head"> <!-- 商品區標題列開始 -->
                    <h2>本次訂單商品</h2> <!-- 顯示商品區標題 -->
                    <div class="order-badge">待送出</div> <!-- 顯示目前狀態標籤 -->
                </div> <!-- 商品區標題列結束 -->
                <p class="section-tip">這裡顯示目前購物車中的所有商品，資料仍然由原本的購物車讀取邏輯提供。</p> <!-- 顯示商品區說明文字 -->
                <div class="info-grid"> <!-- 設定上方統計資訊區開始 -->
                    <div class="info-card"> <!-- 商品項數卡片開始 -->
                        <div class="info-card-title">商品項數</div> <!-- 顯示卡片標題 -->
                        <div class="info-card-value" id="count">0</div> <!-- 顯示商品列數 -->
                    </div> <!-- 商品項數卡片結束 -->
                    <div class="info-card"> <!-- 商品總數量卡片開始 -->
                        <div class="info-card-title">商品總數量</div> <!-- 顯示卡片標題 -->
                        <div class="info-card-value" id="total-quantity">0</div> <!-- 顯示商品總數量 -->
                    </div> <!-- 商品總數量卡片結束 -->
                    <div class="info-card"> <!-- 訂單總金額卡片開始 -->
                        <div class="info-card-title">訂單總金額</div> <!-- 顯示卡片標題 -->
                        <div class="info-card-value">$<span id="total">0</span></div> <!-- 顯示訂單總金額 -->
                    </div> <!-- 訂單總金額卡片結束 -->
                </div> <!-- 設定上方統計資訊區結束 -->
                <div class="order-list-shell"> <!-- 訂單商品區外框開始 -->
                    <div id="order-list"></div> <!-- 訂單商品明細容器 -->
                </div> <!-- 訂單商品區外框結束 -->
            </div> <!-- 左側商品資訊面板結束 -->
            <div class="panel"> <!-- 右側取餐資訊面板開始 -->
                <h2 class="section-title">取餐與聯絡資訊</h2> <!-- 顯示表單區標題 -->
                <p class="section-tip">保留原本的欄位與送單流程，只重新整理資訊區塊外觀，方便專題展示與操作。</p> <!-- 顯示表單區說明 -->
                <div class="form-box"> <!-- 顧客資料表單開始 -->
                    <div class="row"> <!-- 顧客姓名欄位開始 -->
                        <label for="customer-name">顧客姓名</label> <!-- 顧客姓名標籤 -->
                        <input id="customer-name" type="text" maxlength="40" placeholder="例如：王小明"> <!-- 顧客姓名輸入框 -->
                    </div> <!-- 顧客姓名欄位結束 -->
                    <div class="row"> <!-- 電話欄位開始 -->
                        <label for="phone">電話</label> <!-- 電話標籤 -->
                        <input id="phone" type="tel" maxlength="30" placeholder="例如：0912345678"> <!-- 電話輸入框 -->
                    </div> <!-- 電話欄位結束 -->
                    <div class="row"> <!-- 取餐時間欄位開始 -->
                        <label for="pickup-time">預計取餐時間</label> <!-- 取餐時間標籤 -->
                        <input id="pickup-time" type="time"> <!-- 取餐時間輸入框 -->
                    </div> <!-- 取餐時間欄位結束 -->
                    <div class="row"> <!-- 訂單備註欄位開始 -->
                        <label for="order-note">訂單備註</label> <!-- 訂單備註標籤 -->
                        <textarea id="order-note" rows="3" maxlength="200" placeholder="例如：趕時間、餐點分開裝"></textarea> <!-- 訂單備註輸入框 -->
                    </div> <!-- 訂單備註欄位結束 -->
                </div> <!-- 顧客資料表單結束 -->
                <div class="summary"> <!-- 訂單總結區開始 -->
                    <div>目前狀態：待送出</div> <!-- 顯示目前還沒送出的狀態 -->
                    <div>系統來源：目前購物車與既有訂單 API</div> <!-- 顯示系統說明 -->
                    <div>送出後會建立訂單主表與訂單明細，再清空這次購物車。</div> <!-- 顯示送單提示 -->
                </div> <!-- 訂單總結區結束 -->
                <div class="btn-area"> <!-- 下方按鈕區開始 -->
                    <button class="btn back-btn" onclick="goBack()">返回購物車</button> <!-- 返回購物車按鈕 -->
                    <button class="btn send-btn" onclick="sendOrder()">送出訂單</button> <!-- 送出訂單按鈕 -->
                </div> <!-- 下方按鈕區結束 -->
            </div> <!-- 右側取餐資訊面板結束 -->
        </div> <!-- 主要內容排版結束 -->
    </div> <!-- 頁面主外框結束 -->
    <script> // JavaScript 區塊開始
        let cartCode = ""; // 建立變數保存目前瀏覽器的 cart_code
        let cartData = []; // 建立陣列保存後端回傳的購物車資料
        function getCartCode() { // 這個函式負責取得目前瀏覽器的購物車代號
            let code = localStorage.getItem("cart_code"); // 從 localStorage 讀取 cart_code
            if (!code) { // 如果目前沒有 cart_code
                code = "cart_" + new Date().getTime(); // 使用目前時間建立新 cart_code
                localStorage.setItem("cart_code", code); // 把新 cart_code 存回 localStorage
            } // cart_code 檢查結束
            return code; // 回傳 cart_code
        } // getCartCode 函式結束
        async function loadCart() { // 這個函式負責從後端讀取購物車資料
            cartCode = getCartCode(); // 先取得目前瀏覽器的 cart_code
            try { // 開始呼叫後端 API
                let response = await fetch("/get_cart_items?cart_code=" + encodeURIComponent(cartCode)); // 呼叫讀取購物車 API
                let result = await response.json(); // 把後端回應轉成 JSON 物件
                if (result.success) { // 如果後端回傳成功
                    cartData = result.items; // 把購物車商品存進 cartData
                    render(result.count, result.total_quantity, result.total_amount); // 將購物車資料畫到結帳頁
                } else { // 如果後端回傳失敗
                    alert("讀取購物車失敗：" + result.message); // 顯示後端錯誤訊息
                } // 成功失敗判斷結束
            } catch (error) { // 如果網路或後端連線發生錯誤
                alert("讀取購物車失敗，請確認 Flask 是否有啟動"); // 顯示連線錯誤提示
                console.log(error); // 把錯誤印到 console 方便除錯
            } // try catch 結束
        } // loadCart 函式結束
        function appendTextBlock(parent, className, text) { // 這個函式負責安全建立文字區塊
            let div = document.createElement("div"); // 建立 div 元素
            div.className = className; // 設定 div 的 class
            div.textContent = text; // 使用 textContent 放文字，避免 HTML 注入
            parent.appendChild(div); // 把 div 加進父層容器
        } // appendTextBlock 函式結束
        function render(count, totalQuantity, totalAmount) { // 這個函式負責把訂單明細顯示在結帳頁
            let list = document.getElementById("order-list"); // 找到商品明細容器
            list.textContent = ""; // 清空舊內容，避免累積重複資料
            if (cartData.length === 0) { // 如果購物車沒有任何商品
                let empty = document.createElement("div"); // 建立空狀態 div
                empty.className = "empty"; // 設定空狀態 class
                empty.textContent = "目前沒有商品"; // 設定空狀態文字
                list.appendChild(empty); // 把空狀態放到商品明細容器
                document.getElementById("count").textContent = "0"; // 商品項數顯示 0
                document.getElementById("total-quantity").textContent = "0"; // 商品總數量顯示 0
                document.getElementById("total").textContent = "0"; // 總金額顯示 0
                return; // 結束渲染函式
            } // 空購物車判斷結束
            for (let i = 0; i < cartData.length; i++) { // 逐一顯示每筆商品
                let item = cartData[i]; // 取出目前這筆商品
                let itemBox = document.createElement("div"); // 建立商品外框
                itemBox.className = "item"; // 設定商品外框 class
                appendTextBlock(itemBox, "name", item.product_name); // 顯示商品名稱
                appendTextBlock(itemBox, "text", "單價：$" + item.price); // 顯示商品單價
                appendTextBlock(itemBox, "text", "數量：" + item.quantity); // 顯示商品數量
                appendTextBlock(itemBox, "text", "客製化：" + item.options); // 顯示商品選項
                appendTextBlock(itemBox, "text", "小計：$" + item.subtotal); // 顯示商品小計
                list.appendChild(itemBox); // 把商品外框放進商品明細容器
            } // 商品明細迴圈結束
            document.getElementById("count").textContent = count; // 更新商品項數
            document.getElementById("total-quantity").textContent = totalQuantity; // 更新商品總數量
            document.getElementById("total").textContent = totalAmount; // 更新總金額
        } // render 函式結束
        function goBack() { // 這個函式負責返回購物車頁
            window.location.href = "/cart"; // 跳到購物車路由
        } // goBack 函式結束
        function readOrderForm() { // 這個函式負責讀取顧客資料表單
            let data = {}; // 準備資料物件
            data.customer_name = document.getElementById("customer-name").value.trim(); // 讀取顧客姓名
            data.phone = document.getElementById("phone").value.trim(); // 讀取電話
            data.pickup_time = document.getElementById("pickup-time").value.trim(); // 讀取取餐時間
            data.note = document.getElementById("order-note").value.trim(); // 讀取訂單備註
            return data; // 回傳表單資料
        } // readOrderForm 函式結束
        function validateOrderForm(data) { // 這個函式負責檢查結帳表單
            if (!data.customer_name) { // 如果顧客姓名空白
                alert("請填顧客姓名"); // 顯示提醒
                return false; // 回傳檢查失敗
            } // 顧客姓名檢查結束
            if (!data.phone) { // 如果電話空白
                alert("請填電話"); // 顯示提醒
                return false; // 回傳檢查失敗
            } // 電話檢查結束
            if (!data.pickup_time) { // 如果取餐時間空白
                alert("請選預計取餐時間"); // 顯示提醒
                return false; // 回傳檢查失敗
            } // 取餐時間檢查結束
            return true; // 表單檢查通過
        } // validateOrderForm 函式結束
        function buildOrderData(formData) { // 這個函式負責把購物車資料整理成訂單資料
            let items = []; // 建立陣列保存要送去訂單模組的商品明細
            for (let i = 0; i < cartData.length; i++) { // 逐一整理目前購物車內的每一筆商品
                let item = cartData[i]; // 取出目前這一筆購物車商品
                items.push({ // 把購物車商品整理成訂單要用的格式
                    product_id: item.product_id, // 放入商品編號
                    product_name: item.product_name, // 放入商品名稱
                    price: item.price, // 放入商品單價
                    quantity: item.quantity, // 放入商品數量
                    options: item.options, // 放入商品客製化文字
                    option_ids: item.option_ids, // 放入商品選項 id 字串
                    subtotal: item.subtotal // 放入商品小計
                }); // 單筆商品整理完成
            } // 商品整理迴圈結束
            let totalAmount = 0; // 建立變數保存訂單總金額
            let totalQuantity = 0; // 建立變數保存商品總數量
            for (let i = 0; i < items.length; i++) { // 逐一累加整理後商品的金額與數量
                totalAmount = totalAmount + items[i].subtotal; // 累加訂單總金額
                totalQuantity = totalQuantity + items[i].quantity; // 累加商品總數量
            } // 統計迴圈結束
            let orderData = {}; // 建立最終要送去後端的訂單資料物件
            orderData.cart_code = cartCode; // 放入目前購物車代號
            orderData.customer_name = formData.customer_name; // 放入顧客姓名
            orderData.phone = formData.phone; // 放入顧客電話
            orderData.pickup_time = formData.pickup_time; // 放入取餐時間
            orderData.note = formData.note; // 放入訂單備註
            orderData.item_count = items.length; // 放入商品筆數
            orderData.total_quantity = totalQuantity; // 放入商品總數量
            orderData.total_amount = totalAmount; // 放入訂單總金額
            orderData.items = items; // 放入整理好的商品明細
            return orderData; // 回傳整理好的訂單資料
        } // buildOrderData 函式結束
        async function sendOrder() { // 這個函式負責把訂單送到後端
            if (cartData.length === 0) { // 如果購物車沒有商品
                alert("沒有商品"); // 顯示提醒
                return; // 停止送單
            } // 空購物車檢查結束
            let formData = readOrderForm(); // 讀取顧客資料
            if (!validateOrderForm(formData)) { // 如果顧客資料檢查沒過
                return; // 停止送單
            } // 顧客資料檢查結束
            let ok = confirm("確定要送出訂單嗎？"); // 送出前再確認一次
            if (!ok) { // 如果使用者按取消
                return; // 停止送單
            } // 送單確認判斷結束
            let orderData = buildOrderData(formData); // 把目前購物車與表單資料整理成訂單資料
            try { // 開始呼叫後端 API
                let response = await fetch("/api/orders", { // 呼叫新的訂單 API
                    method: "POST", // 使用 POST 方法送資料
                    headers: { "Content-Type": "application/json" }, // 告訴後端這次送 JSON
                    body: JSON.stringify(orderData) // 把整理好的訂單資料轉成 JSON 字串送出
                }); // fetch 呼叫結束
                let result = await response.json(); // 把後端回應轉成 JSON
                if (result.success) { // 如果後端建立訂單成功
                    localStorage.removeItem("cart_code"); // 清掉舊購物車代號，下一次點餐會重新建立
                    window.location.href = result.redirect_url || ("/order_success/" + result.order_id); // 跳到訂單成功頁
                } else { // 如果後端建立訂單失敗
                    alert("送出失敗：" + result.message); // 顯示後端錯誤訊息
                } // 成功失敗判斷結束
            } catch (error) { // 如果網路或後端連線發生錯誤
                alert("後端連線失敗，請確認 Flask 是否有啟動"); // 顯示連線錯誤提示
                console.log(error); // 把錯誤印到 console 方便除錯
            } // try catch 結束
        } // sendOrder 函式結束
        loadCart(); // 頁面一載入就讀取購物車資料
    </script> <!-- JavaScript 區塊結束 -->
</body> <!-- body 區塊結束 -->
</html> <!-- HTML 文件結束 -->
