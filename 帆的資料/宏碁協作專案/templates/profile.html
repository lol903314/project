<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>會員資料</title>
  <style>
body {
    font-family: "Microsoft JhengHei", sans-serif;
    margin: 0;
    padding: 0;
    background-color: #f5f5f5;
    display: flex;
    justify-content: center;
}

/* 手機框 */
.mobile-container {
    width: 100%;
    max-width: 450px;
    min-height: 100vh;
    background-color: white;
    box-shadow: 0 0 20px rgba(0,0,0,0.1);
}

/* 上方圖片 */
.image-box {
    width: 100%;
    height: 250px;
    overflow: hidden;
}
.image-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 標題 */
.header {
    text-align: flex-start;
    padding: 15px;
}
.header h1 {
    margin: 5px 0;
    text-align: center;
}

/* 表單 */
.form-box {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* 表單 */
.form-box form {
    display: flex;
    flex-direction: column;
    align-items: center;  /* 水平置中 */
}

/* 輸入框 */
.form-box input {
    width: 80%;
    padding: 12px;
    font-size: 16px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

/* 按鈕 */
.submit-btn {
    width: 80%;
    background-color: #ff5722;
    color: white;
    border: none;
    padding: 12px;
    font-size: 16px;
    border-radius: 25px;
    cursor: pointer;
}

/* 連結 */
.link-box {
    text-align: center;
    margin-top: 10px;
}
.link-box a {
    color: #2196F3;
    text-decoration: none;
}

.profile-table {
    width: 80%;
    margin: 20px auto;
    border-collapse: collapse;
    font-family: "Microsoft JhengHei";
}

.profile-table th,
.profile-table td {
    border: 1px solid #ddd;
    padding: 12px;
    text-align: center;
}

.profile-table th {
    background-color: #ff5722;
    color: white;
}

.profile-table tr:nth-child(even) {
    background-color: #f9f9f9;
}
  </style>
</head>

<body>

  <div class="mobile-container">
	<div class="image-box">
	  <img src="{{url_for('static',filename='store_logo.jpg')}}">
	</div>
	<div class="header">
	  <h1>會員資料</h1>
	  <h1>-----------------</h1>
    </div>
    <table class="profile-table">
      <tr>
        <td><h2>帳號</h2></td>
        <td><h2>{{user}}</h2></td>
      </tr>
      <tr>
        <td><h2>密碼</h2></td>
        <td><h2>{{password}}</h2></td>
      </tr>
      <tr>
        <td><h2>會員</h2></td>
        <td><h2>{{name}}</h2></td>
      </tr>
      <tr>
        <td><h2>信箱</h2></td>
        <td><h2>{{email}}</h2></td>
      </tr>
    </table>
    <div class="link-box">
      <p>修改會員資料:<a href='/edit_profile'>點我</a></p>
      <p>回點餐頁面:<a href='/mora'>點我</a></p>
	</div>
  </div>
    
    {% if msg %}
    <script>alert({{msg|tojson}});</script>
    {% endif %}

</body>

</html>
