<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品詳細頁</title>
    <style>
        /* 手機優先布局控制 */
        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            margin: 0; padding: 0; 
            background-color: #f5f5f5; /* 背景改淺灰，讓中間的手機框更明顯 */
            display: flex;
            justify-content: center;
        }
        
        /* 模擬手機容器 */
        .mobile-container {
            width: 100%;
            max-width: 450px; /* 限制寬度，模擬手機大螢幕 */
            min-height: 100vh;
            background-color: white;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            padding-bottom: 80px; /* 預留底部功能列空間 */
        }

        /* 返回鍵 */
        .back-btn { 
            position: absolute; top: 15px; left: 15px; 
            width: 35px; height: 35px;
            background: rgba(255,255,255,0.8); 
            border: none; border-radius: 50%; cursor: pointer; z-index: 10;
            font-size: 18px; font-weight: bold;
        }

        /* 圖片區 */
        .image-box { 
            width: 100%; 
            height: 300px; 
            background-color: black; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; /* 確保超出部分被剪裁 */
        }

        .image-box img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* 這是關鍵：確保圖片填滿格子的同時不會變形 */
        }

        /* 介紹文案 */
        .description { 
            padding: 20px; 
            color: rgba(0, 0, 0, 0.5);
            font-size: 15px; line-height: 1.5;
            border-bottom: 8px solid #f5f5f5; /* 分隔線區塊 */
        }

        /* 選項標題：橘色背景 */
        .option-title { 
            background-color: orange; 
            color: white; 
            padding: 10px 20px; 
            font-weight: bold;
            font-size: 20px;
        }

        /* 單選選項排版：一排一個 */
        .option-item { 
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            font-size: 16px;
        }
        .option-item input {
            margin-right: 15px;
            width: 18px;
            height: 18px;
        }

        /* 底部固定欄 */
        .footer-bar { 
            position: absolute; bottom: 0; width: 100%; 
            height: 75px; background: white; 
            border-top: 1px solid #eee; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; box-sizing: border-box; 
        }

        .price-section { font-size: 22px; font-weight: bold; color: #ff5722; }
        
        .counter-group { display: flex; align-items: center; gap: 12px; }
        .btn-adjust { 
            width: 32px; height: 32px; 
            border: 1px solid #ddd; background: #fff; 
            border-radius: 50%; font-size: 20px; cursor: pointer;
        }

        .confirm-btn { 
            background-color: #ff5722; color: white; 
            border: none; padding: 12px 20px; 
            border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="mobile-container">
        <button class="back-btn" onclick="history.back()">〈</button>
        <div class="image-box">
            <img src="{{ url_for('static', filename='images/MilkTea.jpg') }}" alt="經典奶茶">
        </div>

        <div class="description">
            <h2 id="food-name" style="color:#333; margin-top:0; margin-bottom:10px;">經典錫蘭奶茶</h2>
            <p id="food-desc">
                嚴選斯里蘭卡錫蘭紅茶，搭配濃郁乳香，口感順滑、香氣持久。
                不論是冷飲或是熱飲都能品味出最純粹的奶茶風味。
            </p>
        </div>

        <div class="option-title">溫度</div>
        <label class="option-item">
            <input type="radio" name="temp" value="cold" checked> 冰
        </label>
        <label class="option-item">
            <input type="radio" name="temp" value="hot"> 熱
        </label>

        <div class="option-title">甜度</div>
        <label class="option-item"><input type="radio" name="sugar" value="全糖" checked>全糖</label>
        <label class="option-item"><input type="radio" name="sugar" value="少糖">少糖</label>
        <label class="option-item"><input type="radio" name="sugar" value="半糖">半糖</label>
        <label class="option-item"><input type="radio" name="sugar" value="微糖">微糖</label>
        <label class="option-item"><input type="radio" name="sugar" value="無糖">無糖</label>

        <div class="footer-bar">
            <div class="price-section">$<span id="total-price">50</span></div>
            
            <div class="counter-group">
                <button class="btn-adjust" onclick="updateQty(-1)">-</button>
                <span id="quantity">1</span>
                <button class="btn-adjust" onclick="updateQty(1)">+</button>
                <button class="confirm-btn" onclick="submitOrder()">加入購物車</button>
            </div>
        </div>
    </div>

    <script>
        let currentQty = 1;
        const unitPrice = 50;

        function updateQty(change) {
            currentQty += change;
            if (currentQty < 1) currentQty = 1;
            document.getElementById('quantity').innerText = currentQty;
            document.getElementById('total-price').innerText = currentQty * unitPrice;
        }
        function submitOrder() {
            // 抓取選中的溫度和甜度
            const temp = document.querySelector('input[name="temp"]:checked').value;
            const sugar = document.querySelector('input[name="sugar"]:checked').value;
            alert(`已加入購物車！\n餐點：經典錫蘭奶茶\n數量：${currentQty}\n甜度 : ${sugar}\n總計：$${currentQty * unitPrice}`);
        }
    </script>
</body>
</html>
